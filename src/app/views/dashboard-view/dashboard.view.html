<section
  class="flex h-screen min-h-0 flex-col overflow-hidden bg-slate-50 text-slate-900 transition-colors duration-300 dark:bg-slate-950 dark:text-slate-100"
>
  <header
    class="flex shrink-0 items-center justify-between border-b border-slate-200 bg-white px-4 py-3 dark:border-white/10 dark:bg-slate-900"
  >
    <div class="flex items-center gap-4">
      <h1 class="text-lg font-semibold tracking-tight">UniChat</h1>
      <div class="flex items-center gap-2">
        <span
          class="inline-flex items-center rounded-full border border-slate-200 bg-slate-100 px-2.5 py-1 text-xs font-medium text-slate-600 dark:border-white/10 dark:bg-white/5 dark:text-slate-400"
        >
          {{ getFeedMode() === "mixed" ? "Mixed" : "Split" }}
        </span>
      </div>
    </div>

    <div class="flex items-center gap-2">
      <div class="flex items-center gap-1 rounded-xl bg-slate-100 p-1 dark:bg-white/5">
        @for (feedMode of feedModes; track feedMode) {
          <button
            type="button"
            (click)="setFeedMode(feedMode)"
            class="rounded-lg px-3 py-1.5 text-xs font-medium transition"
            [class]="
              dashboardPreferencesService.preferences().feedMode === feedMode
                ? 'bg-white text-slate-900 shadow-sm dark:bg-white/10 dark:text-white'
                : 'text-slate-600 hover:text-slate-900 dark:text-slate-400 dark:hover:text-white'
            "
          >
            {{ feedMode === "mixed" ? "Mixed" : "Split" }}
          </button>
        }
      </div>

      <button
        type="button"
        (click)="toggleTheme()"
        class="rounded-xl border border-slate-200 bg-white px-3 py-1.5 text-xs font-medium text-slate-700 transition hover:bg-slate-50 dark:border-white/10 dark:bg-white/5 dark:text-slate-300 dark:hover:bg-white/10"
      >
        {{ themeMode() === "dark" ? "Light" : "Dark" }}
      </button>

      <button
        type="button"
        (click)="openSettings()"
        class="rounded-xl bg-slate-900 px-4 py-1.5 text-xs font-medium text-white transition hover:bg-slate-800 dark:bg-white dark:text-slate-950 dark:hover:bg-slate-200"
      >
        Settings
      </button>
    </div>
  </header>

  <main
    [class]="
      getFeedMode() === 'split'
        ? 'flex min-h-0 min-w-0 flex-1 flex-col gap-3 overflow-hidden p-3'
        : 'flex min-h-0 min-w-0 flex-1 flex-col overflow-hidden'
    "
  >
    @if (getFeedMode() === "split") {
      <app-dashboard-split-feed />
    } @else {
      <app-dashboard-mixed-feed />
    }
  </main>

  <app-settings-modal [isOpen]="isSettingsOpen()" (closed)="closeSettings()" />
</section>
