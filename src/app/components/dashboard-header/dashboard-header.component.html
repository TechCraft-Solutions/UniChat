<header
  class="flex h-14 shrink-0 items-center justify-between border-b px-4"
  [class.border-zinc-200]="themeMode() === 'light'"
  [class.bg-white]="themeMode() === 'light'"
  [class.border-zinc-800]="themeMode() === 'dark'"
  [class.glass]="themeMode() === 'dark'"
  role="banner"
>
  <div class="flex items-center gap-3">
    <h1 id="page-title" class="text-base font-semibold">Dashboard</h1>
  </div>

  <!-- Action Buttons -->
  <div class="flex items-center gap-1">
    <button
      type="button"
      (click)="toggleSearch.emit()"
      class="rounded-lg p-2 transition"
      [class.text-zinc-500]="themeMode() === 'light'"
      [class.hover:bg-zinc-100]="themeMode() === 'light'"
      [class.text-zinc-400]="themeMode() === 'dark'"
      [class.hover:bg-white/10]="themeMode() === 'dark'"
      title="Search"
    >
      <mat-icon fontIcon="search" class="text-base!" />
    </button>
    <button
      type="button"
      (click)="togglePinned.emit()"
      class="relative rounded-lg p-2 transition"
      [class.text-zinc-500]="themeMode() === 'light'"
      [class.hover:bg-zinc-100]="themeMode() === 'light'"
      [class.text-zinc-400]="themeMode() === 'dark'"
      [class.hover:bg-white/10]="themeMode() === 'dark'"
      title="Pinned Messages"
    >
      <mat-icon fontIcon="push_pin" class="text-base!" />
      @if (pinnedCount() > 0) {
        <span
          class="absolute -top-0.5 -right-0.5 flex h-4 min-w-[18px] items-center justify-center rounded-full text-[10px] font-bold"
          [class.bg-indigo-600]="themeMode() === 'dark'"
          [class.text-white]="themeMode() === 'dark'"
          [class.bg-zinc-700]="themeMode() === 'light'"
          [class.text-zinc-100]="themeMode() === 'light'"
        >
          {{ pinnedCount() > 99 ? "99+" : pinnedCount() }}
        </span>
      }
    </button>
    <button
      type="button"
      (click)="toggleShortcuts.emit()"
      class="rounded-lg p-2 transition"
      [class.text-zinc-500]="themeMode() === 'light'"
      [class.hover:bg-zinc-100]="themeMode() === 'light'"
      [class.text-zinc-400]="themeMode() === 'dark'"
      [class.hover:bg-white/10]="themeMode() === 'dark'"
      title="Keyboard Shortcuts"
    >
      <mat-icon fontIcon="keyboard" class="text-base!" />
    </button>
  </div>
</header>
