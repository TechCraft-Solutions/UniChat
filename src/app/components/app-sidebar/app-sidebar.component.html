<nav
  class="sticky top-0 flex h-full w-16 flex-col border-r"
  [class.border-zinc-200]="themeMode() === 'light'"
  [class.bg-white]="themeMode() === 'light'"
  [class.border-zinc-800]="themeMode() === 'dark'"
  [class.bg-zinc-900]="themeMode() === 'dark'"
>
  <div class="flex flex-col items-center gap-3 p-3">
    <div
      class="flex h-10 w-10 items-center justify-center rounded-xl bg-indigo-600 shadow-lg shadow-indigo-500/20"
    >
      <img src="assets/images/icon.png" alt="UniChat" class="h-6 w-6 object-contain" />
    </div>
  </div>

  <nav class="flex flex-1 flex-col items-center gap-2 py-4">
    @for (item of menu; track item.path) {
      <button
        type="button"
        (click)="navigate(item.path)"
        class="flex h-11 w-11 items-center justify-center rounded-xl transition-all"
        [class]="
          isActive(item.path)
            ? 'bg-indigo-600 text-white'
            : 'text-zinc-500 hover:bg-zinc-100 dark:text-zinc-400 dark:hover:bg-zinc-800'
        "
        [title]="item.label"
      >
        <mat-icon [fontIcon]="item.icon" class="h-5! w-5! text-xl!" />
      </button>
    }
  </nav>

  <div
    class="flex flex-col items-center gap-2 border-t p-3"
    [class.border-zinc-200]="themeMode() === 'light'"
    [class.border-zinc-800]="themeMode() === 'dark'"
  >
    <button
      type="button"
      (click)="toggleTheme()"
      class="flex h-11 w-11 items-center justify-center rounded-xl transition-all"
      [class]="
        themeMode() === 'dark'
          ? 'text-zinc-400 hover:bg-zinc-800'
          : 'text-zinc-500 hover:bg-zinc-100'
      "
      title="Toggle theme"
    >
      <mat-icon
        [fontIcon]="themeMode() === 'dark' ? 'light_mode' : 'dark_mode'"
        class="h-5! w-5! text-xl!"
      />
    </button>
  </div>
</nav>
