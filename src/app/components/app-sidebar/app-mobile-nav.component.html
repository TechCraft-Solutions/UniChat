<nav
  class="glass mx-auto flex items-center rounded-full px-4 py-2 shadow-lg"
  role="navigation"
  aria-label="Mobile navigation"
>
  @for (item of navItems; track item.path) {
    <button
      type="button"
      (click)="navigate(item.path)"
      class="flex min-w-[3rem] flex-col items-center justify-center rounded-full px-3 py-1 transition-all"
      [class]="isActive(item.path) ? 'text-indigo-500' : 'text-zinc-500 dark:text-zinc-400'"
      [attr.aria-label]="item.label"
      [attr.aria-current]="isActive(item.path) ? 'page' : null"
    >
      <mat-icon [fontIcon]="item.icon" class="h-5! w-5! text-xl!" />
      <span class="mt-0.5 text-[10px] font-medium">{{ item.label }}</span>
    </button>
  }
</nav>
