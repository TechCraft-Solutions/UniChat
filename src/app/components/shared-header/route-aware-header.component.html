<header
  class="flex h-14 shrink-0 items-center justify-between border-b px-6"
  [class.border-zinc-200]="themeMode() === 'light'"
  [class.bg-white]="themeMode() === 'light'"
  [class.border-zinc-800]="themeMode() === 'dark'"
  [class.glass]="themeMode() === 'dark'"
  role="banner"
>
  <div class="flex items-center gap-4">
    <h1
      class="text-lg font-semibold"
      [class.text-zinc-900]="themeMode() === 'light'"
      [class.text-zinc-100]="themeMode() === 'dark'"
    >
      {{ routeInfo().title }}
    </h1>
    @if (routeInfo().subtitle) {
      <span
        class="text-sm"
        [class.text-zinc-500]="themeMode() === 'light'"
        [class.text-zinc-400]="themeMode() === 'dark'"
        >{{ routeInfo().subtitle }}</span
      >
    }
    @if (isDashboard()) {
      <div
        class="flex items-center gap-2 rounded-full px-2.5 py-1 text-xs font-medium"
        [class.bg-green-500/10]="themeMode() === 'dark'"
        [class.text-green-500]="themeMode() === 'dark'"
        [class.border]="themeMode() === 'dark'"
        [class.border-green-500/20]="themeMode() === 'dark'"
        [class.bg-green-100]="themeMode() === 'light'"
        [class.text-green-700]="themeMode() === 'light'"
      >
        <span
          class="h-1.5 w-1.5 animate-pulse rounded-full"
          [class.bg-green-500]="themeMode() === 'dark'"
          [class.bg-green-600]="themeMode() === 'light'"
        ></span>
        Live
      </div>
    }
  </div>

  <!-- Right side actions -->
  <div class="flex items-center gap-2">
    @if (!isDashboard()) {
      <button
        type="button"
        (click)="onOpenShortcuts()"
        class="flex items-center gap-1.5 rounded-lg border px-3 py-1.5 text-xs font-medium transition"
        [class.border-zinc-200]="themeMode() === 'light'"
        [class.text-zinc-600]="themeMode() === 'light'"
        [class.hover:bg-zinc-50]="themeMode() === 'light'"
        [class.border-white/10]="themeMode() === 'dark'"
        [class.text-zinc-400]="themeMode() === 'dark'"
        [class.hover:bg-white/5]="themeMode() === 'dark'"
        title="Keyboard shortcuts"
      >
        <mat-icon [fontIcon]="'keyboard'" class="h-5! w-5!" />
        <span class="hidden sm:inline">Shortcuts</span>
      </button>
    }
  </div>
</header>
