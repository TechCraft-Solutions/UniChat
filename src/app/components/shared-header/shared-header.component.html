<header
  class="sticky top-0 z-40 flex w-full shrink-0 items-center justify-between border-b border-zinc-200 bg-white/80 px-6 py-3 backdrop-blur dark:border-white/10 dark:bg-zinc-900/80"
>
  <div class="flex items-center gap-4">
    @if (showBackButton()) {
      <a
        [routerLink]="backLink()"
        [queryParams]="backQueryParams()"
        class="inline-flex items-center gap-2 rounded-xl border border-zinc-200 bg-white text-zinc-700 transition hover:bg-zinc-100 dark:border-white/10 dark:bg-white/5 dark:text-zinc-200 dark:hover:bg-white/10"
      >
        <mat-icon [fontIcon]="'arrow_back'" class="text-lg" />
      </a>
    }

    <div class="flex flex-col">
      <h1 class="text-lg font-semibold tracking-tight text-zinc-900 dark:text-white">
        {{ title() }}
      </h1>
      @if (subtitle()) {
        <p class="text-xs text-zinc-600 dark:text-zinc-400">
          {{ subtitle() }}
        </p>
      }
    </div>
  </div>

  <div class="flex items-center gap-2">
    <ng-content />
  </div>
</header>
