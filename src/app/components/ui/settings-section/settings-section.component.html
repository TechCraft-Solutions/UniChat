<div
  class="rounded-2xl border p-6 shadow-sm"
  [class.border-zinc-200]="themeMode() === 'light'"
  [class.bg-white]="themeMode() === 'light'"
  [class.dark:border-white/10]="themeMode() === 'dark'"
  [class.dark:bg-zinc-800]="themeMode() === 'dark'"
>
  <!-- Header with toggle -->
  <div class="flex items-start justify-between">
    <div class="flex-1">
      <h2
        class="text-lg font-semibold"
        [class.text-zinc-900]="themeMode() === 'light'"
        [class.text-zinc-100]="themeMode() === 'dark'"
      >
        {{ title() }}
      </h2>
      @if (description()) {
        <p
          class="mt-1 text-sm"
          [class.text-zinc-600]="themeMode() === 'light'"
          [class.text-zinc-400]="themeMode() === 'dark'"
        >
          {{ description() }}
        </p>
      }
    </div>
    <button
      type="button"
      (click)="toggle()"
      class="rounded-lg p-2 transition"
      [class.text-zinc-500]="themeMode() === 'light'"
      [class.hover:bg-zinc-100]="themeMode() === 'light'"
      [class.hover:text-zinc-700]="themeMode() === 'light'"
      [class.dark:text-zinc-400]="themeMode() === 'dark'"
      [class.dark:hover:bg-white/10]="themeMode() === 'dark'"
      [class.dark:hover:text-zinc-200]="themeMode() === 'dark'"
      [attr.aria-expanded]="!collapsed()"
      [attr.aria-label]="'Toggle ' + title() + ' section'"
    >
      <mat-icon
        [fontIcon]="'expand_more'"
        class="h-7! w-6! text-2xl! transition-transform duration-200"
        [class.rotate-180]="collapsed()"
      />
    </button>
  </div>

  <!-- Content with collapse animation -->
  @if (!collapsed()) {
    <div class="animate-fade-in mt-4">
      <ng-content />
    </div>
  }
</div>
