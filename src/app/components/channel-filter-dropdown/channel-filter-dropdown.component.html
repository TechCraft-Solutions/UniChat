<!-- Toggle Button -->
<button
  type="button"
  (click)="$event.stopPropagation(); toggleDropdown()"
  class="filter-dropdown-trigger inline-flex h-8 w-8 items-center justify-center rounded-lg border transition"
  [class.border-zinc-200]="themeMode() === 'light'"
  [class.bg-white]="themeMode() === 'light'"
  [class.text-zinc-700]="themeMode() === 'light'"
  [class.hover:bg-zinc-50]="themeMode() === 'light'"
  [class.dark:border-white/20]="themeMode() === 'dark'"
  [class.dark:bg-white/5]="themeMode() === 'dark'"
  [class.dark:text-zinc-300]="themeMode() === 'dark'"
  [class.dark:hover:bg-white/10]="themeMode() === 'dark'"
  [attr.aria-expanded]="showDropdown()"
  aria-haspopup="true"
  title="Filter channels"
>
  <mat-icon [fontIcon]="'tune'" class="h-4! w-4! text-base!" />
  <mat-icon
    [fontIcon]="showDropdown() ? 'expand_less' : 'expand_more'"
    class="absolute bottom-0 h-3! w-3! text-xs!"
  />
</button>

<!-- Filter Dropdown Panel -->
@if (showDropdown()) {
  <div
    class="filter-dropdown-panel absolute top-full left-0 z-30 w-full rounded-xl border shadow-xl"
    [class.border-zinc-200]="themeMode() === 'light'"
    [class.bg-white]="themeMode() === 'light'"
    [class.dark:border-white/10]="themeMode() === 'dark'"
    [class.dark:bg-zinc-900]="themeMode() === 'dark'"
    (click)="$event.stopPropagation()"
  >
    <!-- Header -->
    <div
      class="flex items-center justify-between border-b px-3 py-2.5"
      [class.border-zinc-200]="themeMode() === 'light'"
      [class.dark:border-white/10]="themeMode() === 'dark'"
    >
      <span
        class="text-sm font-semibold"
        [class.text-zinc-800]="themeMode() === 'light'"
        [class.dark:text-zinc-100]="themeMode() === 'dark'"
      >
        Filter Channels
      </span>
      <button
        type="button"
        (click)="close()"
        class="rounded p-1 transition"
        [class.text-zinc-500]="themeMode() === 'light'"
        [class.hover:bg-zinc-100]="themeMode() === 'light'"
        [class.dark:text-zinc-400]="themeMode() === 'dark'"
        [class.dark:hover:bg-white/10]="themeMode() === 'dark'"
        aria-label="Close filter dropdown"
      >
        <mat-icon [fontIcon]="'close'" class="h-4! w-4!" />
      </button>
    </div>

    <!-- Search Input -->
    <div
      class="border-b px-3 py-2.5"
      [class.border-zinc-200]="themeMode() === 'light'"
      [class.dark:border-white/10]="themeMode() === 'dark'"
    >
      <div class="relative">
        <mat-icon
          [fontIcon]="'search'"
          class="absolute top-1/2 left-2.5 h-4! w-4! -translate-y-1/2 text-lg! text-zinc-400"
        />
        <input
          type="text"
          [ngModel]="filterSearchQuery()"
          (ngModelChange)="filterSearchQuery.set($event)"
          placeholder="Search channels…"
          class="w-full rounded-lg border py-1.5 pr-3 pl-8 text-xs transition outline-none"
          [class.border-zinc-200]="themeMode() === 'light'"
          [class.bg-zinc-50]="themeMode() === 'light'"
          [class.text-zinc-900]="themeMode() === 'light'"
          [class.placeholder:text-zinc-400]="themeMode() === 'light'"
          [class.focus:border-indigo-500]="themeMode() === 'light'"
          [class.dark:border-white/10]="themeMode() === 'dark'"
          [class.dark:bg-black/20]="themeMode() === 'dark'"
          [class.dark:text-white]="themeMode() === 'dark'"
          [class.dark:placeholder:text-zinc-500]="themeMode() === 'dark'"
          [class.dark:focus:border-indigo-400]="themeMode() === 'dark'"
        />
      </div>
    </div>

    <!-- Selection Count Badge -->
    <div class="flex items-center justify-between px-3 py-2">
      <span
        class="text-xs"
        [class.text-zinc-500]="themeMode() === 'light'"
        [class.dark:text-zinc-400]="themeMode() === 'dark'"
      >
        Selected
      </span>
      <span class="rounded-full bg-indigo-600 px-2 py-0.5 text-xs font-medium text-white">
        {{ selectedCount() }} / {{ visibleChannelCount }}
      </span>
    </div>

    <!-- Channel List -->
    <div class="max-h-64 overflow-y-auto px-2 pb-2">
      @for (channel of filteredChannels(); track channel.id) {
        <label
          class="flex cursor-pointer items-center gap-2.5 rounded-lg px-2 py-2 text-sm transition"
          [class.hover:bg-zinc-100]="themeMode() === 'light'"
          [class.dark:hover:bg-white/5]="themeMode() === 'dark'"
        >
          <input
            type="checkbox"
            [checked]="isChannelEnabled(channelRefFor(channel))"
            (change)="toggleChannel(channelRefFor(channel))"
            class="h-4 w-4 rounded border-zinc-300 text-indigo-600 focus:ring-indigo-500"
          />
          <img
            [src]="platformIconUrl(channel.platform)"
            [alt]="platformLabel(channel.platform)"
            [title]="platformLabel(channel.platform)"
            class="h-4 w-4 shrink-0 object-contain"
            loading="lazy"
          />
          @if (getChannelImage(channel); as channelImage) {
            <img
              [src]="channelImage"
              [alt]="channel.channelName"
              class="h-5 w-5 rounded-full object-cover"
              loading="lazy"
            />
          } @else {
            <div
              class="flex h-5 w-5 items-center justify-center rounded-full text-[9px] font-bold uppercase"
              [class.bg-zinc-200]="themeMode() === 'light'"
              [class.text-zinc-600]="themeMode() === 'light'"
              [class.dark:bg-zinc-700]="themeMode() === 'dark'"
              [class.dark:text-zinc-300]="themeMode() === 'dark'"
            >
              {{ getChannelInitial(channel.channelName) }}
            </div>
          }
          <span
            class="min-w-0 flex-1 truncate"
            [class.text-zinc-700]="themeMode() === 'light'"
            [class.text-zinc-200]="themeMode() === 'dark'"
          >
            {{ channel.channelName }}
          </span>
        </label>
      }
      @if (filteredChannels().length === 0) {
        <p
          class="px-2 py-4 text-center text-xs"
          [class.text-zinc-500]="themeMode() === 'light'"
          [class.dark:text-zinc-400]="themeMode() === 'dark'"
        >
          No channels match your search
        </p>
      }
    </div>

    <!-- Footer Actions -->
    <div
      class="flex items-center justify-end gap-3 border-t px-3 py-2.5"
      [class.border-zinc-200]="themeMode() === 'light'"
      [class.dark:border-white/10]="themeMode() === 'dark'"
    >
      <button
        type="button"
        (click)="clearAll()"
        class="text-xs underline transition"
        [class.text-zinc-500]="themeMode() === 'light'"
        [class.hover:text-zinc-700]="themeMode() === 'light'"
        [class.dark:text-zinc-400]="themeMode() === 'dark'"
        [class.dark:hover:text-zinc-200]="themeMode() === 'dark'"
      >
        Clear All
      </button>
      <button
        type="button"
        (click)="selectAll()"
        class="text-xs font-medium underline transition"
        [class.text-indigo-600]="themeMode() === 'light'"
        [class.hover:text-indigo-700]="themeMode() === 'light'"
        [class.dark:text-indigo-400]="themeMode() === 'dark'"
        [class.dark:hover:text-indigo-300]="themeMode() === 'dark'"
      >
        Select All
      </button>
    </div>
  </div>
}
